name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zsdb
          POSTGRES_USER: zs
          POSTGRES_PASSWORD: zs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zs -d zsdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      APP_HOST: 127.0.0.1
      APP_PORT: 3001
      LOG_LEVEL: warn
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_NAME: zsdb
      DATABASE_USER: zs
      DATABASE_PASSWORD: zs
      DATABASE_SCHEMA: public
      DATABASE_SSL: 'false'
      DATABASE_LOGGING: 'false'
      ENABLE_BOOTSTRAP_ADMIN: 'true'
      ALLOW_BOOTSTRAP_ADMIN_IN_PRODUCTION: 'false'
      DEFAULT_ADMIN_USERNAME: owner
      DEFAULT_ADMIN_PASSWORD: OwnerBootstrap2026!
      SESSION_COOKIE_SECURE: 'false'
      SESSION_COOKIE_SAME_SITE: lax
      SESSION_CSRF_SECRET: ci-csrf-secret-0123456789
      ALLOW_SESSION_ID_HEADER: 'false'
      LOGIN_MAX_ATTEMPTS: 5
      LOGIN_LOCKOUT_MINUTES: 15
      CORS_ORIGINS: http://127.0.0.1:5173
      LOGIN_RATE_LIMIT_MAX: 10
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: 600
      AUTH_BURST_RATE_LIMIT_MAX: 60
      AUTH_BURST_RATE_LIMIT_WINDOW_SECONDS: 60
      BUSINESS_TIMEZONE: UTC
      E2E_BASE_URL: http://127.0.0.1:3001
      E2E_USERNAME: owner
      E2E_PASSWORD: OwnerBootstrap2026!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Install backend
        run: npm ci
        working-directory: backend
      - name: Backend typecheck and release gate
        run: |
          npm run build
          npm run typecheck
          npm run test:infra
          npm run check:readiness
          npm run check:permissions
          npm run check:env-safety
        working-directory: backend
      - name: Start backend for E2E
        run: |
          npm run migration:run
          chmod +x ../scripts/wait-for-http.sh
          node dist/main.js > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:3001/health/live > /dev/null; then
              echo "Backend is live"
              exit 0
            fi
            if ! kill -0 "$BACKEND_PID" 2>/dev/null; then
              echo "Backend process exited before becoming healthy"
              cat /tmp/backend.log
              exit 1
            fi
            sleep 1
          done
          echo "Timed out waiting for backend liveness"
          cat /tmp/backend.log
          exit 1
        working-directory: backend
      - name: Run backend E2E
        run: npm run test:e2e
        working-directory: backend
      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm ci
        working-directory: frontend
      - name: Run frontend QA
        run: npm run qa
        working-directory: frontend
