services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zsdb}
      POSTGRES_USER: ${POSTGRES_USER:-zs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zs} -d ${POSTGRES_DB:-zsdb}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_MODE: ${APP_MODE:-online}
      NODE_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 3001
      LOG_LEVEL: info
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-zsdb}
      DATABASE_USER: ${POSTGRES_USER:-zs}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      DATABASE_SCHEMA: public
      DATABASE_SSL: "false"
      DATABASE_SSL_REJECT_UNAUTHORIZED: "true"
      DATABASE_SSL_CA_CERT: ""
      DATABASE_LOGGING: "false"
      ENABLE_BOOTSTRAP_ADMIN: ${ENABLE_BOOTSTRAP_ADMIN:-true}
      ALLOW_BOOTSTRAP_ADMIN_IN_PRODUCTION: "false"
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-change-me-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-change-me-admin-password}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAME_SITE: lax
      SESSION_CSRF_SECRET: ${SESSION_CSRF_SECRET:-change-me-csrf-secret}
      ALLOW_SESSION_ID_HEADER: "false"
      LOGIN_MAX_ATTEMPTS: 5
      LOGIN_LOCKOUT_MINUTES: 15
      CORS_ORIGINS: http://localhost:5173
      LOGIN_RATE_LIMIT_MAX: 10
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: 600
      AUTH_BURST_RATE_LIMIT_MAX: 60
      AUTH_BURST_RATE_LIMIT_WINDOW_SECONDS: 60
      BUSINESS_TIMEZONE: UTC
    ports:
      - "3001:3001"
    command: sh -c "npm run migration:run && npm start"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  pgdata:
